<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <!-- Auth Form Section -->
        <section id="auth-section" class="glass-panel active-section">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Securely access your account</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button class="primary-btn" type="submit">Sign In <span class="arrow">→</span></button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" required placeholder="••••••••">
                </div>
                <button class="primary-btn" type="submit">Create Account <span class="arrow">→</span></button>
            </form>

            <div id="auth-message" class="message"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="glass-panel hidden-section">
            <div class="dashboard-header">
                <div class="user-avatar">
                   <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <h2>Dashboard</h2>
                <button id="logout-btn" class="secondary-btn">Logout</button>
            </div>
            
            <div class="dashboard-content">
                <div class="status-card">
                    <div class="status-icon success-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <h3>Authentication Successful</h3>
                    <p>You have securely accessed the protected application area using a valid JSON Web Token.</p>
                </div>

                <div class="server-response">
                    <h4>Server Message:</h4>
                    <p id="dashboard-message">Loading...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
